services:
  api:
    image: mabalderramav/dance_studio_api_image:latest
    container_name: dancestudio-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: server=host.docker.internal;initial catalog=${DB_NAME:-DanceStudioDb};User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};trust server certificate=true
      JwtSettings__Audience: ${JWT_AUDIENCE:-DanceStudio}
      JwtSettings__Issuer: ${JWT_ISSUER:-DanceStudio}
      JwtSettings__Secret: ${JWT_SECRET:-ReplaceWithALongRandomSecretAtLeast64CharsLongForJwtSigning1234567890}
      JwtSettings__TokenExpirationInMinutes: ${JWT_EXP_MINUTES:-60}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - miasoftnanus-network

networks:
  miasoftnanus-network:
    external: true

