services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: dancestudio-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dancestudio-api:latest
    container_name: dancestudio-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: server=sqlserver;initial catalog=${DB_NAME:-DanceStudioDb};User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};trust server certificate=true
      JwtSettings__Audience: ${JWT_AUDIENCE:-DanceStudio}
      JwtSettings__Issuer: ${JWT_ISSUER:-DanceStudio}
      JwtSettings__Secret: ${JWT_SECRET:-ReplaceWithALongRandomSecretAtLeast64CharsLongForJwtSigning1234567890}
      JwtSettings__TokenExpirationInMinutes: ${JWT_EXP_MINUTES:-60}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:

